version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/member/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        omit_unused_structs: true
  - engine: "postgresql"
    queries: "internal/share/"
    schema: "migrations/"
    gen:
      go:
        package: "sharesqlc"
        out: "internal/share/repository/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        omit_unused_structs: true