linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - bodyclose
    - noctx
    - wrapcheck
    - exhaustive
    - gocyclo
    - revive
    - gosec

linters-settings:
  govet:
    enable:
      - shadow
  gocyclo:
    min-complexity: 15
  wrapcheck:
    ignorePackageGlobs:
      - "github.com/yourorg/*"
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - wrapcheck
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0