# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      GOTOOLCHAIN: local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Ensure go.mod and go.sum are clean and reproducible.
      - name: Verify dependencies
        shell: bash
        run: |
          go mod tidy

          if [ -n "$(git diff -- go.mod go.sum)" ]; then
            echo "go.mod or go.sum was modified:"
            git diff -- go.mod go.sum
            exit 1
          fi

      # Run golangci-lint using the same Go toolchain.
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m --config=.golangci.yml

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

  test:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go modules
        run: go mod verify

      - name: Run unit tests
        run: |
          go test -race -count=1 -short -coverprofile=coverage.out -covermode=atomic ./...

      # Upload coverage artifact for later aggregation
      # This allows combining coverage from parallel jobs
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7
