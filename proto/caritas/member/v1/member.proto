syntax = "proto3";

package caritas.member.v1;

option go_package = "github.com/yaninyzwitty/caritas-backend/gen/caritas/member/v1";

import "google/protobuf/timestamp.proto";

// MemberService manages SACCO member lifecycle operations within a branch.
service MemberService {
  // RegisterMember registers a new SACCO member with their branch and profile details.
  // Returns the created member with auto-generated member number.
  rpc RegisterMember(RegisterMemberRequest) returns (RegisterMemberResponse);

  // GetMember retrieves member details by ID or national ID within a branch.
  rpc GetMember(GetMemberRequest) returns (GetMemberResponse);

  // ListMembers lists members within a branch with cursor-based pagination.
  // Supports optional filtering by status.
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);

  // UpdateMemberProfile updates a member's profile information.
  rpc UpdateMemberProfile(UpdateMemberProfileRequest) returns (UpdateMemberProfileResponse);

  // UpdateMemberStatus changes a member's status with an audit reason.
  rpc UpdateMemberStatus(UpdateMemberStatusRequest) returns (UpdateMemberStatusResponse);

  // CloseMember permanently deactivates a member account.
  rpc CloseMember(CloseMemberRequest) returns (CloseMemberResponse);

  // GetMemberStatusHistory retrieves the chronological history of member status changes.
  rpc GetMemberStatusHistory(GetMemberStatusHistoryRequest) returns (GetMemberStatusHistoryResponse);
}

// MemberStatus represents the lifecycle states of a SACCO member.
enum MemberStatus {
  MEMBER_STATUS_UNSPECIFIED = 0;
  MEMBER_STATUS_PENDING = 1;
  MEMBER_STATUS_ACTIVE = 2;
  MEMBER_STATUS_SUSPENDED = 3;
  MEMBER_STATUS_CLOSED = 4;
  MEMBER_STATUS_REJECTED = 5;
}

// RelationshipType defines the relationship between a member and their next of kin.
enum RelationshipType {
  RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  RELATIONSHIP_TYPE_SPOUSE = 1;
  RELATIONSHIP_TYPE_CHILD = 2;
  RELATIONSHIP_TYPE_PARENT = 3;
  RELATIONSHIP_TYPE_SIBLING = 4;
  RELATIONSHIP_TYPE_FRIEND = 5;
  RELATIONSHIP_TYPE_OTHER = 6;
}

// Identification holds government-issued ID information for a member.
message Identification {
  string type = 1;
  string number = 2;
}

// PersonalInfo contains a member's basic personal contact information.
message PersonalInfo {
  string full_name = 1;
  string phone = 2;
  string email = 3;
  google.protobuf.Timestamp date_of_birth = 4;
  string address = 5;
}

// Money represents a monetary amount with currency.
message Money {
  string currency_code = 1;  // ISO 4217 currency code (e.g., "USD", "KES")
  int64 units = 2;           // Whole units of the amount
  int32 nanos = 3;           // Nano units of the amount (must be same sign as units)
}

// Employment represents a member's employment and income information.
message Employment {
  string occupation = 1;
  string employer = 2;
  Money monthly_income = 3;
}

// NextOfKin holds emergency contact and relationship information.
message NextOfKin {
  string name = 1;
  string phone = 2;
  RelationshipType relationship = 3;
}

// MemberProfile combines all profile information for a SACCO member.
message MemberProfile {
  PersonalInfo personal = 1;
  Employment employment = 2;
  Identification id_document = 3;
  NextOfKin next_of_kin = 4;
}

// Member represents a SACCO member with their complete information.
message Member {
  int64 id = 1;
  int64 branch_id = 2;
  int64 member_number = 3;
  string national_id = 4;
  MemberStatus status = 5;
  MemberProfile profile = 6;
  google.protobuf.Timestamp registered_at = 7;
  google.protobuf.Timestamp last_updated = 8;
}

// RegisterMemberRequest contains the information needed to register a new member.
message RegisterMemberRequest {
  int64 branch_id = 1;
  string national_id = 2;
  MemberProfile profile = 3;
}

// RegisterMemberResponse returns the newly registered member.
message RegisterMemberResponse {
  Member member = 1;
}

// GetMemberRequest specifies which member to retrieve.
message GetMemberRequest {
  oneof identifier {
    int64 member_id = 1;
    string national_id = 2;
  }
  int64 branch_id = 3;
}

// GetMemberResponse returns the requested member.
message GetMemberResponse {
  Member member = 1;
}

// ListMembersRequest specifies filtering and pagination for listing members.
message ListMembersRequest {
  int64 branch_id = 1;
  int32 page_size = 2;
  string page_token = 3;
  MemberStatus status_filter = 4;
}

// ListMembersResponse returns a paginated list of members.
message ListMembersResponse {
  repeated Member members = 1;
  string next_page_token = 2;
}

// UpdateMemberProfileRequest specifies the member and profile updates.
message UpdateMemberProfileRequest {
  int64 member_id = 1;
  MemberProfile profile = 2;
}

// UpdateMemberProfileResponse returns the updated member.
message UpdateMemberProfileResponse {
  Member member = 1;
}

// UpdateMemberStatusRequest specifies the status change and reason.
message UpdateMemberStatusRequest {
  int64 member_id = 1;
  MemberStatus new_status = 2;
  string reason = 3;
}

// UpdateMemberStatusResponse returns the updated member.
message UpdateMemberStatusResponse {
  Member member = 1;
}

// CloseMemberRequest specifies the member to close with a reason.
message CloseMemberRequest {
  int64 member_id = 1;
  string reason = 2;
}

// CloseMemberResponse confirms the member closure.
message CloseMemberResponse {
  bool success = 1;
}

// GetMemberStatusHistoryRequest requests status history for a member.
message GetMemberStatusHistoryRequest {
  int64 member_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

// StatusTransition represents a single status change event.
message StatusTransition {
  string from_status = 1;
  string to_status = 2;
  string reason = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

// GetMemberStatusHistoryResponse returns the status history with pagination.
message GetMemberStatusHistoryResponse {
  repeated StatusTransition transitions = 1;
  string next_page_token = 2;
}